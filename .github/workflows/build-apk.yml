      - name: Build Debug APK
        run: |
          ./gradlew assembleLocalDebug --info 2>&1 | grep -A 20 "kaptLocalDebug\|error:\|KAPT\|KaptExecution\|Exception" | tail -80 || true
          ./gradlew assembleLocalDebug 2>&1 | tail -60
        continue-on-error: true

      - name: Show Kapt errors
        run: |
          find . -path "*/kapt3/log*" -name "*.txt" 2>/dev/null | xargs cat 2>/dev/null || echo "No kapt log files found"
          find . -path "*/build/tmp/kapt*" -name "*.log" 2>/dev/null | xargs cat 2>/dev/null || true
