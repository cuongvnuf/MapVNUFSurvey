name: Build APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create secrets.properties
        run: |
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > app/secrets.properties
- name: Build Debug APK
  id: build
  run: ./gradlew assembleLocalDebug --info --stacktrace 2>&1
  continue-on-error: true

- name: Show detailed error logs
  if: steps.build.outcome == 'failure'
  run: |
    echo "=== KAPT ERROR LOGS ==="
    find . -path "*/kapt3/log*" -name "*.txt" 2>/dev/null | while read f; do
      echo "--- $f ---"
      cat "$f"
    done
    # Show full build report
    find . -path "*/build/reports/problems*" -name "*.html" -exec cat {} \;
    exit 1
      # - name: Build Debug APK
      #   id: build
      #   run: ./gradlew assembleLocalDebug --stacktrace 2>&1
      #   continue-on-error: true

      # - name: Show Kapt error details
      #   if: steps.build.outcome == 'failure'
      #   run: |
      #     echo "=== KAPT ERROR LOGS ==="
      #     find . -path "*/kapt3/log*" -name "*.txt" 2>/dev/null | while read f; do
      #       echo "--- $f ---"
      #       cat "$f"
      #     done
      #     echo "=== BUILD REPORT ==="
      #     find . -path "*/build/reports/problems*" -name "*.html" 2>/dev/null | head -3
      #     exit 1

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: MapVNUFSurvey-debug
          path: app/build/outputs/apk/local/debug/*.apk
          retention-days: 7
