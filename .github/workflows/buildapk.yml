name: Build APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create secrets.properties
        run: |
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > app/secrets.properties
      - name: Build Debug APK
        id: build
        run: ./gradlew assembleLocalDebug --stacktrace 2>&1
        continue-on-error: true
      - name: Show Kapt error details
        if: steps.build.outcome == 'failure'
        run: |
          echo "=== PROBLEMS REPORT ==="
          find . -path "*/build/reports/problems*" -name "*.html" 2>/dev/null | while read f; do
            echo "--- $f ---"
            cat "$f" | sed 's/<[^>]*>//g' | grep -v "^$" | head -100
          done
          echo "=== ALL BUILD ERRORS ==="
          find . -path "*/build/outputs/logs*" -o -path "*/build/tmp/kapt*" 2>/dev/null | xargs ls -la 2>/dev/null || true
          find . -name "*.log" -path "*/build/*" 2>/dev/null | while read f; do
            echo "--- $f ---"
            tail -50 "$f"
          done
          echo "=== KAPT STUBS ==="
          find . -path "*/kapt3/stubs*" -name "*.java" 2>/dev/null | head -5 | xargs head -30 2>/dev/null || true
          exit 1
 
      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: MapVNUFSurvey-debug
          path: app/build/outputs/apk/local/debug/*.apk
          retention-days: 7
